name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.APIKEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.AUTHDOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.PROJECTID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.STORAGEBUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.MESSAGINGSENDERID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.APPID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - name: Validate Firebase build env
        run: |
          node -e "const required=['NEXT_PUBLIC_FIREBASE_API_KEY','NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN','NEXT_PUBLIC_FIREBASE_PROJECT_ID','NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET','NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID','NEXT_PUBLIC_FIREBASE_APP_ID']; const missing = required.filter((key) => !process.env[key]); if (missing.length) { console.error('Missing Firebase build env: ' + missing.join(', ')); process.exit(1); }"
      - run: npm run build

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: ml/requirements-inference.txt
      - run: pip install -r ml/requirements-inference.txt pytest httpx scikit-learn pandas
      # Model weights are not committed; tests marked needs_model auto-skip.
      - run: python -m pytest tests/ -v
